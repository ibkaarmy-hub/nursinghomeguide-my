<style>
/* Profile-page–specific styles (kept inline to avoid bloating the global stylesheet) */
.hero { position: relative; height: 460px; background: #1e293b; overflow: hidden; }
.carousel { position: absolute; inset: 0; }
.carousel-track { display: flex; height: 100%; transition: transform .4s ease; }
.carousel-slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; }
.carousel-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15,23,42,.2) 0%, rgba(15,23,42,.85) 100%); }
.carousel-controls { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 3; }
.carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.4); border: none; cursor: pointer; padding: 0; }
.carousel-dot.active { background: white; width: 24px; border-radius: 4px; }
.carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.9); border: none; font-size: 22px; cursor: pointer; z-index: 3; display: none; align-items: center; justify-content: center; }
.hero:hover .carousel-arrow { display: flex; }
.carousel-arrow.prev { left: 20px; }
.carousel-arrow.next { right: 20px; }
.hero-content { position: absolute; inset: 0; display: flex; align-items: flex-end; z-index: 2; padding: 0 20px 60px; pointer-events: none; }
.hero-inner { max-width: 1200px; margin: 0 auto; width: 100%; color: white; pointer-events: auto; }
.back-link-white { color: rgba(255,255,255,.85); font-size: .85rem; display: inline-block; margin-bottom: 16px; }
.back-link-white:hover { color: white; text-decoration: none; }
.hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; line-height: 1.15; color: white; }
.hero-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: .9rem; color: rgba(255,255,255,.9); margin-bottom: 16px; }
.hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
.hero-badge { background: rgba(255,255,255,.15); color: white; padding: 4px 10px; border-radius: 999px; font-size: .75rem; font-weight: 500; backdrop-filter: blur(8px); }
@media (max-width: 600px) {
  .hero { height: 340px; }

}

.summary-box { max-width: 1200px; margin: -40px auto 24px; padding: 0 20px; position: relative; z-index: 5; }
.summary-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.summary-item .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted, #64748b); font-weight: 600; margin-bottom: 6px; }
.summary-item .value { font-size: 1.05rem; font-weight: 700; color: var(--text, #0f172a); }
.summary-item .value.unknown { color: #94a3b8; font-weight: 400; }
.summary-item .sub { font-size: .8rem; color: var(--text-muted, #64748b); margin-top: 2px; }
@media (max-width: 768px) { .summary-card { grid-template-columns: 1fr 1fr; gap: 16px; padding: 18px; } }
@media (max-width: 400px) { .summary-card { grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; } .summary-item .value { font-size: .92rem; } }

.tabs-nav { background: white; border-bottom: 1px solid var(--border, #e2e8f0); position: sticky; top: 56px; z-index: 40; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }

.tabs-nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; gap: 0; }
.tab-btn { background: none; border: none; padding: 14px 14px; cursor: pointer; font: inherit; font-size: .88rem; font-weight: 500; color: var(--text-muted, #64748b); white-space: nowrap; border-bottom: 3px solid transparent; transition: all .15s; }

@media (max-width: 960px) { .profile-page-body { grid-template-columns: 1fr; } .profile-sidebar { position: static; } }
/* Mobile sticky CTA bar */

@media (max-width: 600px) {
  .mobile-cta-bar { display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: white; border-top: 1px solid var(--border, #e2e8f0); padding: 10px 16px 14px; gap: 10px; box-shadow: 0 -4px 12px rgba(0,0,0,.08); }

/* Care level indicator */

@media (max-width: 600px) { .care-level-bar .step { padding: 9px 4px; font-size: .68rem; } }
.care-level-key { font-size: .8rem; color: var(--text-muted, #64748b); margin-top: 8px; }

/* Pricing components */
.price-band { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.price-band-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; color: #1d4ed8; font-weight: 600; }
.price-band-value { font-size: 1.8rem; font-weight: 800; color: #1d4ed8; margin: 4px 0; }
.price-band-note { font-size: .85rem; color: var(--text-muted, #64748b); }
.price-band.unknown { background: #fffbeb; }
.price-band.unknown .price-band-label, .price-band.unknown .price-band-value { color: #92400e; }

.includes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.includes-col h4 { font-size: .82rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid; }

.includes-list li { padding: 6px 0; font-size: .88rem; display: flex; align-items: flex-start; gap: 8px; }

.includes-col.extra li::before { content: "+"; color: #f59e0b; font-weight: 700; flex-shrink: 0; }
.includes-list li.unknown { color: var(--text-muted, #64748b); }
@media (max-width: 600px) { .includes-grid { grid-template-columns: 1fr; } }

/* Capability grid */
.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }

.check-cell.no { background: #fef2f2; color: #991b1b; }
.check-cell.unknown { background: #fffbeb; color: #92400e; }
.check-icon-sm { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; color: white; }
.check-cell.yes .check-icon-sm { background: #10b981; }
.check-cell.no .check-icon-sm { background: #ef4444; }

/* Amenity tags */

.amenity-tag.unverified { background: #f8fafc; color: #94a3b8; font-weight: 400; border: 1px dashed #cbd5e1; }

/* Photos tab grid */
.photo-cats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.photo-cat { padding: 6px 14px; border-radius: 999px; background: #f1f5f9; border: none; font: inherit; font-size: .85rem; cursor: pointer; }
.photo-cat.active { background: #2563eb; color: white; }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.photo-grid a { display: block; aspect-ratio: 4/3; overflow: hidden; border-radius: 8px; background: #f1f5f9; }
.photo-grid img { width: 100%; height: 100%; object-fit: cover; transition: transform .2s; }
.photo-grid a:hover img { transform: scale(1.04); }
@media (max-width: 600px) { .photo-grid { grid-template-columns: 1fr 1fr; } }

/* Reviews */
.review-empty { background: #fffbeb; border: 1px dashed #fbbf24; border-radius: 8px; padding: 18px; color: #92400e; font-size: .9rem; line-height: 1.6; }
.review-empty strong { display: block; margin-bottom: 4px; color: #78350f; }
.rating-large { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
.rating-large .num { font-size: 2.2rem; font-weight: 800; color: var(--text, #0f172a); }
.rating-large .lbl { font-size: .9rem; color: var(--text-muted, #64748b); }

/* Map / nearby */
.map-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border, #e2e8f0); }
.map-wrap iframe { display: block; width: 100%; height: 360px; border: 0; }
.nearby { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.nearby-item { padding: 10px 12px; background: #f8fafc; border-radius: 8px; font-size: .85rem; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.nearby-item .dist { color: var(--text-muted, #64748b); font-size: .8rem; }
@media (max-width: 600px) { .nearby { grid-template-columns: 1fr; } }

/* Sidebar contact card */
.contact-card { background: white; border: 1px solid var(--border, #e2e8f0); border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 14px; }
.contact-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
.cta-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: opacity .15s; margin-bottom: 8px; font-size: .9rem; }
.cta-btn:hover { text-decoration: none; opacity: .9; }
.cta-call { background: #2563eb; color: white; }
.cta-wa { background: #25d366; color: white; }
.cta-maps { background: #f1f5f9; color: var(--text, #0f172a); }
.cta-web { background: white; color: var(--text, #0f172a); border: 1px solid var(--border, #e2e8f0); }
.contact-meta { font-size: .82rem; color: var(--text-muted, #64748b); margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border, #e2e8f0); line-height: 1.7; }
.compare-row { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 10px 12px; margin-top: 12px; font-size: .82rem; color: #78350f; cursor: pointer; }
.checklist-card { background: #f0fdf4; border-color: #bbf7d0; }
.checklist-card h3 { color: #166534; }
.checklist-card ul { font-size: .85rem; color: #166534; line-height: 1.7; padding-left: 18px; margin-top: 6px; }

/* Sample-schedule disclaimer + table */
.schedule-disclaimer { background: #fffbeb; border-left: 3px solid #f59e0b; padding: 12px; border-radius: 4px; font-size: .88rem; color: #78350f; margin-bottom: 14px; }
.schedule-row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; padding: 8px 0; font-size: .88rem; border-bottom: 1px solid #f1f5f9; }
.schedule-row:last-child { border-bottom: none; }
.schedule-row .time { font-weight: 600; color: var(--text-muted, #64748b); }

.unverified-pill { display: inline-block; background: #fffbeb; color: #92400e; border: 1px dashed #fbbf24; padding: 2px 8px; border-radius: 4px; font-size: .72rem; font-weight: 500; margin-left: 6px; vertical-align: middle; }

.warning-box { background: #fef3c7; border-radius: 8px; padding: 14px; margin-top: 18px; font-size: .88rem; color: #78350f; line-height: 1.6; }
</style>

<script src="data.js"></script>
<script>
/* ── Helpers ────────────────────────────────────────────── */
function yn(val) {
  if (val == null) return null;
  const v = String(val).trim().toLowerCase();
  if (['yes','y','true','1'].includes(v)) return true;
  if (['no','n','false','0'].includes(v)) return false;
  return null;
}
function isUnknownText(v) {
  if (!v) return true;
  const s = String(v).toLowerCase();
  return ['not stated','not published','not declared','not confirmed','unknown','tbd','—','-'].some(t => s.includes(t));
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function checkCell(label, val) {
  const state = yn(val);
  if (state === true)  return `<div class="check-cell yes"><span class="check-icon-sm">✓</span> ${escapeHtml(label)}</div>`;
  if (state === false) return `<div class="check-cell no"><span class="check-icon-sm">✗</span> ${escapeHtml(label)}</div>`;
  return `<div class="check-cell unknown"><span class="check-icon-sm">?</span> ${escapeHtml(label)}</div>`;
}
function infoRow(label, value, options = {}) {
  const isUnknown = !value || isUnknownText(value);
  if (isUnknown && !options.showUnknown) return '';
  const cls = isUnknown ? 'info-value unknown' : 'info-value';
  const display = isUnknown ? (options.unknownText || value || 'Not published') : value;
  return `<div class="info-row"><span class="info-label">${escapeHtml(label)}</span><span class="${cls}">${escapeHtml(display)}</span></div>`;
}

/* ── Section renderers (driven by Details sheet) ──────── */
function renderInfoSection(rows) {
  return rows.map(r => infoRow(r.label, r.value, { showUnknown: true })).join('');
}
function renderIncludedExtras(included = [], extras = []) {
  if (!included.length && !extras.length) return '';
  const incHtml = included.map(r => `<li>${escapeHtml(r.label)}</li>`).join('') || '<li class="unknown">— not yet documented —</li>';
  const extHtml = extras.map(r => {
    const cls = isUnknownText(r.value) ? 'unknown' : '';
    const tail = r.value ? ` <span style="color:var(--text-muted,#64748b)">— ${escapeHtml(r.value)}</span>` : '';
    return `<li class="${cls}">${escapeHtml(r.label)}${tail}</li>`;
  }).join('') || '<li class="unknown">— not yet documented —</li>';
  return `<div class="includes-grid">
    <div class="includes-col included"><h4>Included</h4><ul class="includes-list">${incHtml}</ul></div>
    <div class="includes-col extra"><h4>Likely extra cost</h4><ul class="includes-list">${extHtml}</ul></div>
  </div>`;
}
function renderCheckSection(rows) {
  return `<div class="check-grid">${rows.map(r => checkCell(r.label, r.value)).join('')}</div>`;
}
function renderAmenityTags(rows) {
  return `<div class="amenity-tags">${rows.map(r => {
    const unknown = isUnknownText(r.value);
    const text = r.value && !unknown ? `${escapeHtml(r.label)}` : `${escapeHtml(r.label)} — ${escapeHtml(r.value || 'not stated')}`;
    return `<span class="amenity-tag${unknown ? ' unverified' : ''}">${text}</span>`;
  }).join('')}</div>`;
}
function renderNearby(rows) {
  return `<div class="nearby">${rows.map(r =>
    `<div class="nearby-item"><span>${escapeHtml(r.label)}</span><span class="dist">${escapeHtml(r.value || '')}</span></div>`
  ).join('')}</div>`;
}

/* ── Care level computation ─────────────────────────── */
function careLevelHtml(f) {
  const careStr = (f.care_types || '').toLowerCase();
  const has = (key, ...alts) => yn(f['care_' + key]) === true || alts.some(a => careStr.includes(a));
  const independent = has('assisted', 'independent') ? false : false; // never assumed
  const assisted = has('assisted', 'assisted');
  const skilled = has('nursing', 'nursing', 'skilled');
  const memory  = has('dementia', 'dementia', 'memory');
  const palliative = has('palliative', 'palliative', 'hospice');
  const cls = (active) => active ? 'step active' : 'step';
  return `<div class="care-level-bar">
    <div class="${cls(independent)}">Independent</div>
    <div class="${cls(assisted)}">Assisted</div>
    <div class="${cls(skilled)}">Skilled Nursing</div>
    <div class="${cls(memory)}">Memory / Dementia</div>
    <div class="${cls(palliative)}">Palliative</div>
  </div>
  <div class="care-level-key">Solid blue = clearly accepted. Empty = not stated. Always confirm specific clinical capability with the facility.</div>`;
}

/* ── Hero carousel ──────────────────────────────────── */
function buildCarousel(photos) {
  if (!photos.length) return '';
  return `
    <div class="carousel">
      <div class="carousel-track" id="carouselTrack">
        ${photos.map(u => `<div class="carousel-slide" style="background-image:url('${escapeHtml(u)}')"></div>`).join('')}
      </div>
      ${photos.length > 1 ? `
        <button class="carousel-arrow prev" id="prevBtn">‹</button>
        <button class="carousel-arrow next" id="nextBtn">›</button>
        <div class="carousel-controls" id="carouselDots">
          ${photos.map((_,i) => `<button class="carousel-dot${i===0?' active':''}" data-i="${i}"></button>`).join('')}
        </div>` : ''}
    </div>
    <div class="carousel-overlay"></div>`;
}

/* ── Tabs ───────────────────────────────────────────── */
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
}

/* ── Main render ───────────────────────────────────── */
function render(f) {
  const D = f._details || {};
  document.title = `${f.title} — NursingHomeGuide.my`;
  document.getElementById('pageDesc').content =
    `${f.title} in ${f.area || 'Malaysia'}. ${f.shared_price ? 'From RM ' + f.shared_price + '/mo. ' : ''}${f.editorial_summary || ''}`;

  const photos = (f.photos || '').split('|').map(s => s.trim()).filter(Boolean);
  if (!photos.length && f.hero_image) photos.push(f.hero_image);
  /* Reorder: hero_image always first, keeping rest in original order */
  if (f.hero_image && photos.length > 1) {
    const hi = photos.indexOf(f.hero_image);
    if (hi > 0) { photos.splice(hi, 1); photos.unshift(f.hero_image); }
  }

  const ratingMeta = f.rating
    ? `<span>⭐ ${parseFloat(f.rating).toFixed(1)} (${f.review_count || 0} Google reviews)</span>` : '';

  /* Hero badges from care_types */
  const careBadges = (f.care_types || '').split(/[+,]/).map(s => s.trim()).filter(Boolean)
    .slice(0, 5).map(t => `<span class="hero-badge">${escapeHtml(t)}</span>`).join('');

  /* Summary tiles */
  const priceVal = f.shared_price || f.private_price || f.pricing_display || 'Not published';
  const priceUnknown = !f.shared_price && !f.private_price && (!f.pricing_display || isUnknownText(f.pricing_display));
  const summaryTiles = `
    <div class="summary-item">
      <div class="label">Monthly Fees</div>
      <div class="value${priceUnknown ? ' unknown' : ''}">${escapeHtml(priceVal || 'Not published')}</div>
      <div class="sub">${priceUnknown ? 'Call to enquire' : '/ month'}</div>
    </div>
    <div class="summary-item">
      <div class="label">Care Level</div>
      <div class="value" style="font-size:.92rem;line-height:1.3">${escapeHtml((f.care_types || 'Not stated').replace('Nursing Home','Nursing').replace('Assisted Living','Assisted').replace('Rehabilitation','Rehab'))}</div>
      <div class="sub">${f.care_dementia === 'Yes' ? 'incl. dementia' : ''}</div>
    </div>
    <div class="summary-item">
      <div class="label">Languages</div>
      <div class="value${!f.languages ? ' unknown' : ''}">${escapeHtml(f.languages || 'Not stated')}</div>
      <div class="sub"></div>
    </div>
    <div class="summary-item">
      <div class="label">Halal Status</div>
      <div class="value${yn(f.halal) === null ? ' unknown' : ''}">${yn(f.halal) === true ? '✓ Yes' : yn(f.halal) === false ? '✗ No' : 'Not declared'}</div>
      <div class="sub">${yn(f.halal) === null ? 'ask before visit' : ''}</div>
    </div>`;

  /* Sidebar contact buttons */
  const phoneLink   = f.phone        ? `<a href="tel:${escapeHtml(f.phone)}" class="cta-btn cta-call">📞 Call ${escapeHtml(f.phone)}</a>` : '';
  const waLink      = f.whatsapp     ? `<a href="https://wa.me/${(f.whatsapp || '').replace(/\D/g,'')}" target="_blank" class="cta-btn cta-wa">💬 WhatsApp</a>` : '';
  const mapsLink    = f.google_maps_url ? `<a href="${escapeHtml(f.google_maps_url)}" target="_blank" class="cta-btn cta-maps">📍 Google Maps</a>` : '';
  const webLink     = f.website && !f.website.includes('facebook') ? `<a href="${escapeHtml(f.website)}" target="_blank" class="cta-btn cta-web">🌐 Website</a>` : '';

  /* Family checklist (sidebar) — from Details `checklist` section */
  const checklistRows = D.checklist || [];
  const checklistHtml = checklistRows.length ? `
    <div class="contact-card checklist-card">
      <h3>📋 Family checklist</h3>
      <p style="font-size:.85rem; color:#166534; line-height:1.6;">Before your visit, ask for:</p>
      <ul>${checklistRows.map(r => `<li>${escapeHtml(r.label)}</li>`).join('')}</ul>
    </div>` : '';

  /* OVERVIEW tab content */
  const overviewQuickFacts = [
    infoRow('Address', [f.title ? '' : '', D.policies?.find(r => r.label.toLowerCase().includes('address'))?.value, f.area].filter(Boolean).join(', ')),
    infoRow('Area', f.area),
    infoRow('Phone', f.phone),
    infoRow('Languages', f.languages),
    infoRow('Halal certified', yn(f.halal) === true ? '✓ Yes' : yn(f.halal) === false ? '✗ No' : ''),
    infoRow('Wheelchair access', f.wheelchair),
    infoRow('Subsidy accepted', f.subsidy),
    infoRow('Visiting hours', f.visiting_hours),
    infoRow('Google rating', f.rating ? `★ ${parseFloat(f.rating).toFixed(1)} (${f.review_count || 0} reviews)` : ''),
  ].filter(Boolean).join('');

  const policiesHtml = D.policies?.length ? `
    <div class="profile-card"><h2>Policies &amp; Registration</h2>${renderInfoSection(D.policies)}</div>` : '';

  const editorialHtml = f.editorial_summary
    ? `<div class="editor-note"><strong>📋 About</strong> ${escapeHtml(f.editorial_summary)}</div>` : '';

  /* PRICING tab */
  const pricingRows = [
    f.shared_price    ? `<tr><td>Shared Room</td><td class="price-cell">${escapeHtml(f.shared_price)}<span class="per-month">/mo</span></td></tr>` : '',
    f.four_bed_price  ? `<tr><td>4-Bed Room</td><td class="price-cell">${escapeHtml(f.four_bed_price)}<span class="per-month">/mo</span></td></tr>` : '',
    f.dorm_price      ? `<tr><td>Open Ward / Dorm</td><td class="price-cell">${escapeHtml(f.dorm_price)}<span class="per-month">/mo</span></td></tr>` : '',
    f.private_price   ? `<tr><td>Private Room</td><td class="price-cell">${escapeHtml(f.private_price)}<span class="per-month">/mo</span></td></tr>` : '',
  ].filter(Boolean).join('');
  const hasPricing = !!pricingRows;
  const roomsRows = (D.rooms || []).filter(r => /room|bed|dorm|single/i.test(r.label));
  const roomsHtml = roomsRows.length ? `<div class="profile-card"><h2>Room Types &amp; Rates</h2>${renderInfoSection(roomsRows)}</div>` : '';
  const includedExtras = renderIncludedExtras(D.included || [], D.extras || []);

  /* CARE tab */
  const careCells = [
    checkCell('Skilled Nursing',     f.care_nursing),
    checkCell('Assisted Living',     f.care_assisted),
    checkCell('Dementia Care',       f.care_dementia),
    checkCell('Palliative Care',     f.care_palliative),
    checkCell('Rehab / Step-down',   f.care_rehab),
    checkCell('Respite / Short-stay',f.care_respite),
  ].join('');
  const medCells = [
    checkCell('24/7 Registered Nurse',  f.rn_24_7),
    checkCell('Doctor Visits',          f.doctor_visits),
    checkCell('Physiotherapy',          f.medical_physio),
    checkCell('Occupational Therapy',   f.medical_ot),
    checkCell('Wound Care',             f.medical_wound),
    checkCell('Tube Feeding (NG/PEG)',  f.medical_peg),
    checkCell('Dementia Unit',          f.medical_dementia_unit),
    checkCell('Dialysis Support',       f.medical_dialysis),
    checkCell('Oxygen Therapy',         f.medical_oxygen),
    checkCell('Medication Management',  f.medical_meds),
  ].join('');
  const clinicalDetailHtml = D.clinical?.length ? `
    <div class="profile-card"><h2>Clinical Capability Detail</h2>${renderCheckSection(D.clinical)}</div>` : '';
  const staffingHtml = D.staffing?.length ? `
    <div class="profile-card"><h2>Staffing</h2>${renderInfoSection(D.staffing)}</div>` : '';

  /* AMENITIES tab — categorised from Details, with fallback to nothing */
  const amenityCats = [
    ['dining',     '🍽️ Dining'],
    ['activities', '🎯 Activities'],
    ['rooms',      '🛏️ Room features'],
    ['services',   '🧰 Services'],
    ['outdoor',    '🌳 Outdoor & safety'],
  ];
  const amenitiesHtml = amenityCats.map(([key, title]) => {
    const rows = (D[key] || []).filter(r => key !== 'rooms' || !/room|bed|dorm|single/i.test(r.label));
    if (!rows.length) return '';
    return `<div class="amenity-section"><h3>${title}</h3>${renderAmenityTags(rows)}</div>`;
  }).join('');

  const scheduleRows = D.schedule || [];
  const scheduleHtml = scheduleRows.length ? `
    <div class="profile-card">
      <h2>Sample Daily Schedule</h2>
      ${scheduleRows.length && scheduleRows[0].label.toLowerCase().includes('not') ? '' : ''}
      <div>${scheduleRows.map(r => `<div class="schedule-row"><span class="time">${escapeHtml(r.label)}</span><span>${escapeHtml(r.value || '')}</span></div>`).join('')}</div>
    </div>` : '';

  /* PHOTOS tab */
  const photosTabHtml = photos.length ? `
    <div class="profile-card">
      <h2>Photos <span class="count" style="color:var(--text-muted,#64748b);font-weight:400;font-size:.85rem">(${photos.length})</span></h2>
      <div class="photo-grid">
        ${photos.map((u,i) => `<a href="${escapeHtml(u)}" target="_blank"><img src="${escapeHtml(u)}" alt="${escapeHtml(f.title)} photo ${i+1}" loading="lazy" /></a>`).join('')}
      </div>
    </div>` : `<div class="profile-card"><h2>Photos</h2><p class="text-muted">No photos available yet.</p></div>`;

  /* REVIEWS tab */
  const reviewsTabHtml = `
    <div class="profile-card">
      <h2>Reviews</h2>
      ${f.rating ? `
        <div class="rating-large">
          <div class="num">${parseFloat(f.rating).toFixed(1)}</div>
          <div class="lbl">${f.review_count || 0} Google reviews</div>
        </div>
        <div class="review-empty">
          <strong>Read reviews on Google</strong>
          We don't republish individual reviews. For decision-making we recommend reading the full reviews on Google and asking the facility if you can speak with current resident families on your visit.
          <br /><br />
          <a href="${escapeHtml(f.google_maps_url || '#')}" target="_blank" style="font-weight:600;">Read all reviews on Google →</a>
        </div>` : `<p class="text-muted">No public ratings yet.</p>`}
    </div>`;

  /* MAP tab */
  const mapTabHtml = `
    <div class="profile-card">
      <h2>Location${D.nearby?.length ? ' & Nearby' : ''}</h2>
      ${(f.latitude && f.longitude) ? `
        <div class="map-wrap">
          <iframe src="https://maps.google.com/maps?q=${f.latitude},${f.longitude}&z=15&output=embed" allowfullscreen loading="lazy"></iframe>
        </div>` : '<p class="text-muted">Location not available.</p>'}
      ${D.nearby?.length ? `<h3 style="margin-top:18px;">Nearby landmarks</h3>${renderNearby(D.nearby)}` : ''}
      <div style="margin-top:14px; font-size:.85rem;">${infoRow('Address', f.area, { showUnknown: true })}</div>
    </div>`;

  /* Assemble */
  document.getElementById('profileContent').innerHTML = `
    <div class="hero">
      ${buildCarousel(photos)}
      <div class="hero-content">
        <div class="hero-inner">
          <a href="facilities.html" class="back-link-white">← All facilities</a>
          <h1>${escapeHtml(f.title)}</h1>
          <div class="hero-meta">
            <span>📍 ${escapeHtml(f.area || 'Malaysia')}</span>
            ${ratingMeta}
          </div>
          <div class="hero-badges">${careBadges}</div>
        </div>
      </div>
    </div>

    <div class="summary-box"><div class="summary-card">${summaryTiles}</div></div>

    <div class="tabs-nav">
      <div class="tabs-nav-inner">
        <button class="tab-btn active" data-tab="overview"  onclick="showTab('overview')">Overview</button>
        <button class="tab-btn"        data-tab="pricing"   onclick="showTab('pricing')">Pricing</button>
        <button class="tab-btn"        data-tab="care"      onclick="showTab('care')">Care</button>
        <button class="tab-btn"        data-tab="amenities" onclick="showTab('amenities')">Amenities</button>
        <button class="tab-btn"        data-tab="photos"    onclick="showTab('photos')">Photos</button>
        <button class="tab-btn"        data-tab="reviews"   onclick="showTab('reviews')">Reviews</button>
        <button class="tab-btn"        data-tab="map"       onclick="showTab('map')">Map</button>
      </div>
    </div>

    <div class="profile-page-body">
      <div class="profile-main">

        <div class="tab-panel active" id="tab-overview">
          ${editorialHtml}
          <div class="profile-card">
            <h2>Quick Facts</h2>
            ${overviewQuickFacts || '<p class="text-muted">Details not yet collected.</p>'}
          </div>
          <div class="profile-card">
            <h2>Care Level Indicator</h2>
            ${careLevelHtml(f)}
          </div>
          ${policiesHtml}
        </div>

        <div class="tab-panel" id="tab-pricing">
          <div class="profile-card">
            <h2>Monthly Fees</h2>
            ${hasPricing ? `<table class="price-table"><thead><tr><th>Room Type</th><th>Monthly Fee</th></tr></thead><tbody>${pricingRows}</tbody></table>`
                          : `<div class="price-band unknown"><div class="price-band-label">Pricing not yet published</div><div class="price-band-note">Contact this facility directly to get current rates.</div></div>`}
            ${includedExtras ? '<h3 style="margin-top:18px">What\'s included vs additional cost</h3>' + includedExtras : ''}
            <div class="warning-box"><strong>⚠️ Always confirm in writing.</strong> Ask for an itemised quote that names the room type, included services, monthly extras (diapers, meds, supplements), deposit, payment frequency, and refund policy. Get it on letterhead before deposit.</div>
          </div>
          ${roomsHtml}
        </div>

        <div class="tab-panel" id="tab-care">
          <div class="profile-card">
            <h2>Care Levels Accepted</h2>
            <div class="check-grid">${careCells}</div>
          </div>
          <div class="profile-card">
            <h2>Medical Capabilities</h2>
            <div class="check-grid">${medCells}</div>
          </div>
          ${clinicalDetailHtml}
          ${staffingHtml}
        </div>

        <div class="tab-panel" id="tab-amenities">
          ${amenitiesHtml ? `<div class="profile-card"><h2>Amenities by Category</h2>${amenitiesHtml}</div>` : '<div class="profile-card"><p class="text-muted">Amenity details not yet collected.</p></div>'}
          ${scheduleHtml}
        </div>

        <div class="tab-panel" id="tab-photos">${photosTabHtml}</div>
        <div class="tab-panel" id="tab-reviews">${reviewsTabHtml}</div>
        <div class="tab-panel" id="tab-map">${mapTabHtml}</div>

      </div>

      <!-- Mobile sticky CTA bar (hidden on desktop via CSS) -->
      <div class="mobile-cta-bar">
        ${f.phone ? `<a href="tel:${escapeHtml(f.phone)}" class="m-call">📞 Call</a>` : ''}
        ${f.whatsapp ? `<a href="https://wa.me/${(f.whatsapp||'').replace(/\D/g,'')}" class="m-wa">💬 WhatsApp</a>` : ''}
      </div>

      <aside class="profile-sidebar">
        <div class="contact-card">
          <h3>Contact this facility</h3>
          ${phoneLink}${waLink}${mapsLink}${webLink}
          <div class="contact-meta">
            <strong>${escapeHtml(f.title)}</strong><br />
            ${escapeHtml(f.area || '')}<br />
          </div>
          <div class="compare-row" onclick="alert('Compare feature coming soon')">⚖️ Add to Compare (up to 3)</div>
          <div class="compare-row" style="background:#f1f5f9; color:var(--text,#0f172a); border-color:var(--border,#e2e8f0); margin-top:6px;" onclick="alert('Save feature coming soon')">❤️ Save this facility</div>
        </div>
        ${checklistHtml}
      </aside>
    </div>`;

  /* Carousel wiring */
  if (photos.length > 1) {
    let cur = 0;
    const track = document.getElementById('carouselTrack');
    const goTo = i => {
      cur = (i + photos.length) % photos.length;
      track.style.transform = `translateX(-${cur * 100}%)`;
      document.querySelectorAll('.carousel-dot').forEach((d,j) => d.classList.toggle('active', j === cur));
    };
    document.getElementById('prevBtn').onclick = () => goTo(cur - 1);
    document.getElementById('nextBtn').onclick = () => goTo(cur + 1);
    document.querySelectorAll('.carousel-dot').forEach(d => d.onclick = () => goTo(+d.dataset.i));
    setInterval(() => goTo(cur + 1), 6000);
  }
}

/* ── Boot ───────────────────────────────────────────── */
(async () => {
  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) {
    document.getElementById('profileContent').innerHTML = '<div style="padding:60px 20px;text-align:center;"><p>No facility selected. <a href="facilities.html">Browse all facilities</a>.</p></div>';
    return;
  }
  try {
    const f = await loadFacilityWithDetails(slug);
    if (!f) {
      document.getElementById('profileContent').innerHTML = `<div style="padding:60px 20px;text-align:center;"><p>Facility not found: ${escapeHtml(slug)}</p></div>`;
      return;
    }
    render(f);
  } catch (e) {
    console.error(e);
    document.getElementById('profileContent').innerHTML = `<div style="padding:60px 20px;text-align:center;"><p>Error loading facility data.</p></div>`;
  }
})();
</script>

</body>
</html>
