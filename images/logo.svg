<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- sweep=1 → clockwise in SVG → left (42,250) → top (250,42) → right (458,250) -->
    <path id="topArc" d="M 42 250 A 208 208 0 0 1 458 250" fill="none"/>
  </defs>

  <!-- Background -->
  <circle cx="250" cy="250" r="248" fill="#ffffff"/>

  <!-- Outer ring: dark navy -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#1e3a5f" stroke-width="10"/>

  <!-- Inner accent ring: blue -->
  <circle cx="250" cy="250" r="221" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Stars sit on inner ring at horizontal midline -->
  <text x="29" y="257" font-family="Arial,sans-serif" font-size="18" fill="#2563eb" text-anchor="middle">★</text>
  <text x="471" y="257" font-family="Arial,sans-serif" font-size="18" fill="#2563eb" text-anchor="middle">★</text>

  <!-- NURSINGHOME GUIDE — centred on top arc -->
  <text font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-weight="900"
        font-size="22" fill="#1e3a5f" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="31%">NURSINGHOME GUIDE</textPath>
  </text>

  <!-- Tree trunk -->
  <line x1="250" y1="334" x2="250" y2="248"
        stroke="#7a5510" stroke-width="8" stroke-linecap="round"/>

  <!-- Branches -->
  <line x1="250" y1="248" x2="250" y2="158"
        stroke="#7a5510" stroke-width="5" stroke-linecap="round"/>
  <path d="M 250 258 C 238 228 224 204 215 178"
        stroke="#7a5510" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 250 258 C 262 228 276 204 285 178"
        stroke="#7a5510" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 250 275 C 228 258 208 236 188 208"
        stroke="#7a5510" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 250 275 C 272 258 292 236 312 208"
        stroke="#7a5510" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 250 295 C 234 280 218 264 202 248"
        stroke="#7a5510" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 250 295 C 266 280 282 264 298 248"
        stroke="#7a5510" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Heart leaves — ♥ unicode, reliably rendered -->
  <!-- Top centre: gold, large -->
  <text x="250" y="158" font-family="Arial,sans-serif" font-size="38"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Upper-left: green -->
  <text x="215" y="178" font-family="Arial,sans-serif" font-size="32"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Upper-right: green -->
  <text x="285" y="178" font-family="Arial,sans-serif" font-size="32"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Left: gold -->
  <text x="188" y="208" font-family="Arial,sans-serif" font-size="30"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Right: green -->
  <text x="312" y="208" font-family="Arial,sans-serif" font-size="30"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Lower-left: green -->
  <text x="202" y="248" font-family="Arial,sans-serif" font-size="26"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Lower-right: gold -->
  <text x="298" y="248" font-family="Arial,sans-serif" font-size="26"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Centre fillers -->
  <text x="232" y="268" font-family="Arial,sans-serif" font-size="20"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="central">♥</text>
  <text x="268" y="268" font-family="Arial,sans-serif" font-size="20"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <text x="208" y="220" font-family="Arial,sans-serif" font-size="18"
        fill="#16a34a" text-anchor="middle" dominant-baseline="central">♥</text>
  <text x="292" y="220" font-family="Arial,sans-serif" font-size="18"
        fill="#f59e0b" text-anchor="middle" dominant-baseline="central">♥</text>

  <!-- Hand: golden cupped palm supporting tree -->
  <path d="
    M 180 375
    C 168 368, 162 353, 168 340
    C 175 328, 190 324, 200 330
    L 200 305
    Q 200 294, 210 294
    Q 220 294, 220 305
    L 220 298
    Q 220 287, 230 287
    Q 240 287, 240 298
    L 240 296
    Q 240 285, 250 285
    Q 260 285, 260 296
    L 260 300
    Q 268 288, 278 292
    Q 288 296, 286 310
    L 286 328
    Q 308 314, 320 330
    Q 336 348, 328 368
    Q 320 382, 302 380
    L 200 380
    Q 182 380, 180 375 Z
  " fill="#f59e0b"/>
  <!-- Palm crease detail -->
  <path d="M 198 372 Q 250 366 302 372"
        stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Bottom: — MY — -->
  <line x1="148" y1="422" x2="200" y2="422"
        stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
  <text x="250" y="428"
        font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-weight="900" font-size="26" fill="#1e3a5f"
        text-anchor="middle" letter-spacing="8">MY</text>
  <line x1="300" y1="422" x2="352" y2="422"
        stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
</svg>
