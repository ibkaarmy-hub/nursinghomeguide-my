<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Nursing Homes in Johor, Malaysia — NursingHomeGuide.my</title>
  <meta name="description" content="Browse all 125 licensed nursing homes in Johor, Malaysia. Filter by area, compare prices, and find the right care for your family." />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo"><a href="index.html">NursingHome<span>Guide.my</span></a></div>
    <div class="nav-links">
      <a href="facilities.html" style="color:var(--primary)">All Facilities</a>
      <a href="#">About</a>
    </div>
  </div>
</nav>

<div style="background:#1e3a5f; color:#fff; padding:32px 20px;">
  <div style="max-width:1100px; margin:0 auto;">
    <h1 style="font-size:1.8rem; font-weight:800; margin-bottom:8px;">Nursing Homes in Johor, Malaysia</h1>
    <p style="opacity:.8;">Browse and compare licensed facilities — pricing, care types, and contact details.</p>
  </div>
</div>

<div class="section">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name, area, or care type..." />
  </div>

  <div class="filters" id="areaFilters">
    <button class="filter-btn active" data-area="">All Areas</button>
  </div>

  <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center;">
    <span style="font-size:.85rem; color:var(--text-muted)">Show only:</span>
    <button class="filter-btn" id="btnPricing" onclick="togglePricingFilter()">💰 Has Pricing</button>
    <button class="filter-btn" id="btnSubsidy" onclick="toggleSubsidyFilter()">🏛 Accepts Subsidy</button>
    <button class="filter-btn" id="btnWheelchair" onclick="toggleWheelchairFilter()">♿ Wheelchair Access</button>
    <span style="margin-left:auto; font-size:.85rem; color:var(--text-muted)" id="countLabel"></span>
  </div>

  <div class="grid" id="facilitiesGrid">
    <div class="loading"><div class="spinner"></div>Loading facilities...</div>
  </div>

  <div id="loadMoreWrap" style="text-align:center; margin-top:32px; display:none;">
    <button onclick="loadMore()" style="background:#fff; border:2px solid var(--primary); color:var(--primary); padding:11px 28px; border-radius:8px; font-weight:700; cursor:pointer; font-size:.95rem;">Load More</button>
  </div>
</div>

<footer>
  <p>© 2026 NursingHomeGuide.my — A free resource for Malaysian families</p>
</footer>

<script src="data.js?v=2"></script>
<script>
let allFacilities = [];
let filtered = [];
let shown = 0;
const PAGE = 24;
let activeArea = '';
let filterPricing = false, filterSubsidy = false, filterWheelchair = false;

function makeCard(f) {
  const hasPrice = f.shared_price && f.shared_price.trim();
  const priceHtml = hasPrice
    ? `<div class="card-price">From ${f.shared_price}/mo</div>`
    : `<div class="card-price unknown">Call for pricing</div>`;
  const tags = (f.care_types || '').split('+').map(t => t.trim()).filter(Boolean).slice(0,2)
    .map(t => `<span class="tag">${t}</span>`).join('');
  const rating = f.rating ? `<div class="card-rating"><span class="stars">★</span> ${parseFloat(f.rating).toFixed(1)}</div>` : '';
  return `
    <a href="/facility/${f.slug}/" class="card">
      <div class="card-name">${f.title}</div>
      ${f.area ? `<div class="card-area">📍 ${f.area}</div>` : ''}
      ${priceHtml}
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      ${rating}
    </a>`;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = allFacilities.filter(f => {
    if (activeArea && f.area !== activeArea) return false;
    if (filterPricing && !f.shared_price) return false;
    if (filterSubsidy && f.subsidy !== 'Yes') return false;
    if (filterWheelchair && f.wheelchair !== 'Yes') return false;
    if (q) {
      const haystack = `${f.title} ${f.area} ${f.care_types} ${f.services}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  shown = 0;
  document.getElementById('facilitiesGrid').innerHTML = '';
  loadMore();
  document.getElementById('countLabel').textContent = `${filtered.length} facilities`;
}

function loadMore() {
  const slice = filtered.slice(shown, shown + PAGE);
  if (slice.length === 0) {
    document.getElementById('facilitiesGrid').innerHTML += '<div class="empty">No facilities match your filters.</div>';
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }
  slice.forEach(f => {
    document.getElementById('facilitiesGrid').insertAdjacentHTML('beforeend', makeCard(f));
  });
  shown += slice.length;
  document.getElementById('loadMoreWrap').style.display = shown < filtered.length ? 'block' : 'none';
}

function togglePricingFilter() {
  filterPricing = !filterPricing;
  document.getElementById('btnPricing').classList.toggle('active', filterPricing);
  applyFilters();
}
function toggleSubsidyFilter() {
  filterSubsidy = !filterSubsidy;
  document.getElementById('btnSubsidy').classList.toggle('active', filterSubsidy);
  applyFilters();
}
function toggleWheelchairFilter() {
  filterWheelchair = !filterWheelchair;
  document.getElementById('btnWheelchair').classList.toggle('active', filterWheelchair);
  applyFilters();
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

// Handle ?q= from homepage search
const params = new URLSearchParams(window.location.search);
if (params.get('q')) {
  document.getElementById('searchInput').value = params.get('q');
}

loadFacilities().then(data => {
  allFacilities = data.sort((a,b) => parseFloat(b.rating||0) - parseFloat(a.rating||0));

  // Area filters
  const areas = [...new Set(data.map(f => f.area).filter(Boolean))].sort();
  const filtersEl = document.getElementById('areaFilters');
  areas.forEach(area => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.area = area;
    btn.textContent = area;
    btn.onclick = () => {
      document.querySelectorAll('#areaFilters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeArea = area;
      applyFilters();
    };
    filtersEl.appendChild(btn);
  });

  // All areas button
  filtersEl.querySelector('[data-area=""]').onclick = function() {
    document.querySelectorAll('#areaFilters .filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeArea = '';
    applyFilters();
  };

  applyFilters();
});
</script>
</body>
</html>
