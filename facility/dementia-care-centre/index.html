<script>
/* ── Helpers ────────────────────────────────────────────── */
function yn(val) {
  if (val == null) return null;
  const v = String(val).trim().toLowerCase();
  if (['yes','y','true','1'].includes(v)) return true;
  if (['no','n','false','0'].includes(v)) return false;
  return null;
}
function isUnknownText(v) {
  if (!v) return true;
  const s = String(v).toLowerCase();
  return ['not stated','not published','not declared','not confirmed','unknown','tbd','—','-'].some(t => s.includes(t));
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function checkCell(label, val) {
  const state = yn(val);
  if (state === true)  return `<div class="check-cell yes"><span class="check-icon-sm">✓</span> ${escapeHtml(label)}</div>`;
  if (state === false) return `<div class="check-cell no"><span class="check-icon-sm">✗</span> ${escapeHtml(label)}</div>`;
  return `<div class="check-cell unknown"><span class="check-icon-sm">?</span> ${escapeHtml(label)}</div>`;
}
function infoRow(label, value, options = {}) {
  const isUnknown = !value || isUnknownText(value);
  if (isUnknown && !options.showUnknown) return '';
  const cls = isUnknown ? 'info-value unknown' : 'info-value';
  const display = isUnknown ? (options.unknownText || value || 'Not published') : value;
  return `<div class="info-row"><span class="info-label">${escapeHtml(label)}</span><span class="${cls}">${escapeHtml(display)}</span></div>`;
}

/* ── Section renderers (driven by Details sheet) ──────── */
function renderInfoSection(rows) {
  return rows.map(r => infoRow(r.label, r.value, { showUnknown: true })).join('');
}
function renderIncludedExtras(included = [], extras = []) {
  if (!included.length && !extras.length) return '';
  const incHtml = included.map(r => `<li>${escapeHtml(r.label)}</li>`).join('') || '<li class="unknown">— not yet documented —</li>';
  const extHtml = extras.map(r => {
    const cls = isUnknownText(r.value) ? 'unknown' : '';
    const tail = r.value ? ` <span style="color:var(--text-muted,#64748b)">— ${escapeHtml(r.value)}</span>` : '';
    return `<li class="${cls}">${escapeHtml(r.label)}${tail}</li>`;
  }).join('') || '<li class="unknown">— not yet documented —</li>';
  return `<div class="includes-grid">
    <div class="includes-col included"><h4>Included</h4><ul class="includes-list">${incHtml}</ul></div>
    <div class="includes-col extra"><h4>Likely extra cost</h4><ul class="includes-list">${extHtml}</ul></div>
  </div>`;
}
function renderCheckSection(rows) {
  return `<div class="check-grid">${rows.map(r => checkCell(r.label, r.value)).join('')}</div>`;
}
function renderAmenityTags(rows) {
  return `<div class="amenity-tags">${rows.map(r => {
    const unknown = isUnknownText(r.value);
    const text = r.value && !unknown ? `${escapeHtml(r.label)}` : `${escapeHtml(r.label)} — ${escapeHtml(r.value || 'not stated')}`;
    return `<span class="amenity-tag${unknown ? ' unverified' : ''}">${text}</span>`;
  }).join('')}</div>`;
}
function renderNearby(rows) {
  return `<div class="nearby">${rows.map(r =>
    `<div class="nearby-item"><span>${escapeHtml(r.label)}</span><span class="dist">${escapeHtml(r.value || '')}</span></div>`
  ).join('')}</div>`;
}

/* ── Hero carousel ──────────────────────────────────── */
function buildCarousel(photos) {
  if (!photos.length) return '';
  return `
    <div class="carousel">
      <div class="carousel-track" id="carouselTrack">
        ${photos.map(u => `<div class="carousel-slide" style="background-image:url('${escapeHtml(u)}')"></div>`).join('')}
      </div>
      ${photos.length > 1 ? `
        <button class="carousel-arrow prev" id="prevBtn">‹</button>
        <button class="carousel-arrow next" id="nextBtn">›</button>
        <div class="carousel-controls" id="carouselDots">
          ${photos.map((_,i) => `<button class="carousel-dot${i===0?' active':''}" data-i="${i}"></button>`).join('')}
        </div>` : ''}
    </div>
    <div class="carousel-overlay"></div>`;
}

/* ── Tabs ───────────────────────────────────────────── */
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
  const nav = document.querySelector('.tabs-nav');
  if (nav) {
    const y = nav.getBoundingClientRect().top + window.pageYOffset - 56;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

/* ── SEO: canonical URL, OG/Twitter meta, LocalBusiness JSON-LD ── */
const CANONICAL_BASE = 'https://nursinghomeguide.my';

function setOrCreateMeta(attr, key, value) {
  if (!value) return;
  let el = document.head.querySelector(`meta[${attr}="${key}"]`);
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, key);
    document.head.appendChild(el);
  }
  el.setAttribute('content', value);
}
function setCanonical(href) {
  let el = document.head.querySelector('link[rel="canonical"]');
  if (!el) {
    el = document.createElement('link');
    el.setAttribute('rel', 'canonical');
    document.head.appendChild(el);
  }
  el.setAttribute('href', href);
}
function injectSocialMeta(f, canonicalUrl, description) {
  const title = `${f.title} — NursingHomeGuide.my`;
  const img = f.hero_image || '';
  setOrCreateMeta('property', 'og:type', 'website');
  setOrCreateMeta('property', 'og:site_name', 'NursingHomeGuide.my');
  setOrCreateMeta('property', 'og:title', title);
  setOrCreateMeta('property', 'og:description', description);
  setOrCreateMeta('property', 'og:url', canonicalUrl);
  if (img) setOrCreateMeta('property', 'og:image', img);
  setOrCreateMeta('name', 'twitter:card', img ? 'summary_large_image' : 'summary');
  setOrCreateMeta('name', 'twitter:title', title);
  setOrCreateMeta('name', 'twitter:description', description);
  if (img) setOrCreateMeta('name', 'twitter:image', img);
}
function injectStructuredData(f, canonicalUrl) {
  const addr = [f.area, f.state, 'Malaysia'].filter(Boolean).join(', ');
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'LocalBusiness',
    '@id': canonicalUrl,
    name: f.title,
    url: canonicalUrl,
    address: {
      '@type': 'PostalAddress',
      addressLocality: f.area || undefined,
      addressRegion: f.state || undefined,
      addressCountry: 'MY',
    },
  };
  if (f.hero_image) ld.image = f.hero_image;
  if (f.phone) ld.telephone = f.phone;
  if (f.editorial_summary) ld.description = f.editorial_summary.slice(0, 500);
  const lat = parseFloat(f.latitude), lng = parseFloat(f.longitude);
  if (!isNaN(lat) && !isNaN(lng)) {
    ld.geo = { '@type': 'GeoCoordinates', latitude: lat, longitude: lng };
  }
  const rating = parseFloat(f.rating), reviews = parseInt(f.review_count, 10);
  if (!isNaN(rating) && !isNaN(reviews) && reviews > 0) {
    ld.aggregateRating = {
      '@type': 'AggregateRating',
      ratingValue: rating.toFixed(1),
      reviewCount: reviews,
      bestRating: '5',
      worstRating: '1',
    };
  }
  const priceRange = f.pricing_display || (f.shared_price ? `From RM ${f.shared_price}/mo` : null);
  if (priceRange && !isUnknownText(priceRange)) ld.priceRange = priceRange;

  // Strip undefined keys from address
  Object.keys(ld.address).forEach(k => ld.address[k] === undefined && delete ld.address[k]);

  const existing = document.getElementById('ld-localbusiness');
  if (existing) existing.remove();
  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.id = 'ld-localbusiness';
  script.textContent = JSON.stringify(ld);
  document.head.appendChild(script);
}

function render(f) {

  const metaDesc = rawDesc.length > 155 ? rawDesc.slice(0, 152).replace(/\s+\S*$/, '') + '…' : rawDesc;
  document.getElementById('pageDesc').content = metaDesc;

  const canonicalUrl = `${CANONICAL_BASE}/facility/${encodeURIComponent(f.slug || '')}/`;
  setCanonical(canonicalUrl);
  injectSocialMeta(f, canonicalUrl, metaDesc.slice(0, 155));
  injectStructuredData(f, canonicalUrl);

  const photos = (f.photos || '').split('|').map(s => s.trim()).filter(Boolean);
  if (!photos.length && f.hero_image) photos.push(f.hero_image);
  /* Reorder: hero_image always first, keeping rest in original order */
  if (f.hero_image && photos.length > 1) {
    const hi = photos.indexOf(f.hero_image);
    if (hi > 0) { photos.splice(hi, 1); photos.unshift(f.hero_image); }
  }

  const ratingMeta = f.rating
    ? `<span>⭐ ${parseFloat(f.rating).toFixed(1)} (${f.review_count || 0} Google reviews)</span>` : '';

  /* Hero badges from care_types */
  const careBadges = (f.care_types || '').split(/[+,]/).map(s => s.trim()).filter(Boolean)
    .slice(0, 5).map(t => `<span class="hero-badge">${escapeHtml(t)}</span>`).join('');

  /* Summary tiles */
  const priceVal = f.shared_price || f.private_price || f.pricing_display || 'Not published';

  const summaryTiles = `
    <div class="summary-item">
      <div class="label">Monthly Fees</div>

      <div class="sub">${priceUnknown ? 'Call to enquire' : '/ month'}</div>
    </div>
    <div class="summary-item">
      <div class="label">Google Rating</div>
      <div class="value${!f.rating ? ' unknown' : ''}" style="display:flex;align-items:baseline;gap:6px">

      <div class="sub">${yn(f.halal) === null ? 'ask before visit' : ''}</div>

  /* Sidebar contact buttons */

  const waNumber = (() => {

    checkCell('Tube Feeding (NG/PEG)',  f.medical_peg),

(async () => {
  const querySlug = new URLSearchParams(location.search).get('slug');
  /* Static per-facility pages set window.__FACILITY_SLUG. Legacy ?slug=X URLs redirect to the clean URL. */
  if (querySlug && !window.__FACILITY_SLUG) {
    location.replace(`/facility/${encodeURIComponent(querySlug)}/`);
    return;
  }
  const slug = window.__FACILITY_SLUG || querySlug;
  if (!slug) {
    document.getElementById('profileContent').innerHTML = '<div style="padding:60px 20px;text-align:center;"><p>No facility selected. <a href="/facilities.html">Browse all facilities</a>.</p></div>';
    return;
  }
  try {
    const f = await loadFacilityWithDetails(slug);
    if (!f) {
      document.getElementById('profileContent').innerHTML = `<div style="padding:60px 20px;text-align:center;"><p>Facility not found: ${escapeHtml(slug)}</p></div>`;
      return;
    }
    render(f);
  } catch (e) {
    console.error(e);
    document.getElementById('profileContent').innerHTML = `<div style="padding:60px 20px;text-align:center;"><p>Error loading facility data.</p></div>`;
  }
})();</script>

</body>
</html>
